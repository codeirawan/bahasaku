<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BahasaKu SD/MI 📖</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf8f0;
  --bg2: #fef3e2;
  --card: #ffffff;
  --border: #e8d9c0;
  --teal: #0d9488;
  --teal-light: #ccfbf1;
  --teal-dark: #0f766e;
  --coral: #f97316;
  --coral-light: #ffedd5;
  --gold: #d97706;
  --gold-light: #fef3c7;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --text: #1c1917;
  --text2: #57534e;
  --muted: #a8a29e;
  --correct: #059669;
  --correct-bg: #d1fae5;
  --wrong: #dc2626;
  --wrong-bg: #fee2e2;
  --shadow: 0 4px 24px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* floating background blobs */
body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(13,148,136,.06) 0%, transparent 40%),
    radial-gradient(circle at 85% 10%, rgba(249,115,22,.05) 0%, transparent 35%),
    radial-gradient(circle at 70% 80%, rgba(124,58,237,.04) 0%, transparent 40%),
    radial-gradient(circle at 10% 85%, rgba(217,119,6,.05) 0%, transparent 35%);
}

/* wavy top decoration */
.wave-top {
  position:fixed; top:0; left:0; right:0; height:6px; z-index:100;
  background: linear-gradient(90deg, var(--teal), var(--coral), var(--gold), var(--purple), var(--teal));
  background-size: 200% 100%;
  animation: waveShift 4s linear infinite;
}
@keyframes waveShift { from{background-position:0%} to{background-position:200%} }

.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 28px 16px 48px;
  position: relative; z-index: 1;
}

/* ── HEADER ── */
header { text-align:center; margin-bottom:28px; padding-top:12px; }
.header-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--teal-light); color:var(--teal-dark);
  font-size:.72rem; font-weight:800; letter-spacing:1.5px; text-transform:uppercase;
  padding:5px 14px; border-radius:20px; margin-bottom:10px;
}
header h1 {
  font-family:'Baloo 2',cursive; font-weight:800; font-size:2.6rem;
  color:var(--text); line-height:1;
}
header h1 span { color:var(--teal); }
header p { color:var(--text2); font-size:.9rem; margin-top:6px; }

/* ── TABS ── */
.tabs {
  display:flex; gap:6px; justify-content:center;
  margin-bottom:22px; flex-wrap:wrap;
}
.tab {
  padding:9px 20px; border-radius:50px;
  border:2px solid var(--border); background:var(--card);
  color:var(--text2); cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:.85rem; font-weight:700;
  transition:all .18s; box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.tab:hover { border-color:var(--teal); color:var(--teal); }
.tab.active { background:var(--teal); border-color:var(--teal); color:#fff; box-shadow:0 4px 12px rgba(13,148,136,.3); }

/* ── SCOREBAR ── */
.scorebar {
  display:flex; justify-content:space-between; align-items:center;
  background:var(--card); border:2px solid var(--border);
  border-radius:18px; padding:14px 20px; margin-bottom:20px;
  box-shadow:var(--shadow);
}
.sb-item { text-align:center; }
.sb-val { font-family:'Baloo 2',cursive; font-size:1.6rem; font-weight:800; }
.sb-lbl { font-size:.68rem; color:var(--muted); font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.sb-val.green { color:var(--correct); }
.sb-val.red { color:var(--wrong); }
.sb-val.gold { color:var(--gold); }
.sb-val.teal { color:var(--teal); }

/* ── KELAS SELECTOR ── */
.kelas-wrap {
  display:flex; gap:6px; justify-content:center;
  margin-bottom:16px; flex-wrap:wrap;
}
.kelas-btn {
  padding:7px 14px; border-radius:30px;
  border:2px solid var(--border); background:var(--card);
  color:var(--text2); cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:.8rem; font-weight:800;
  transition:all .18s;
}
.kelas-btn:hover { border-color:var(--coral); color:var(--coral); }
.kelas-btn.active {
  border-color:var(--coral); color:var(--coral);
  background:var(--coral-light);
}

/* ── PROGRESS ── */
.progress-wrap {
  background:var(--border); border-radius:99px;
  height:8px; margin-bottom:20px; overflow:hidden;
}
.progress-fill {
  height:100%;
  background:linear-gradient(90deg,var(--teal),var(--coral));
  border-radius:99px; transition:width .4s ease;
}
.progress-label {
  display:flex; justify-content:space-between;
  font-size:.72rem; color:var(--muted); font-weight:700;
  margin-bottom:6px;
}

/* ── QUESTION CARD ── */
.q-card {
  background:var(--card); border:2px solid var(--border);
  border-radius:24px; padding:28px 24px;
  margin-bottom:14px; box-shadow:var(--shadow);
  animation:slideUp .3s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.q-meta {
  display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap;
}
.q-badge {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--teal-light); color:var(--teal-dark);
  font-size:.7rem; font-weight:800; letter-spacing:1px; text-transform:uppercase;
  padding:4px 12px; border-radius:20px;
}
.q-subtema {
  font-size:.72rem; color:var(--muted); font-weight:700;
  background:var(--bg2); padding:4px 10px; border-radius:20px;
}
.q-difficulty {
  font-size:.68rem; font-weight:800; padding:4px 10px; border-radius:20px;
}
.diff-mudah { background:#d1fae5; color:#065f46; }
.diff-sedang { background:#fef3c7; color:#92400e; }
.diff-sulit { background:#fee2e2; color:#991b1b; }

.q-emoji { font-size:2.4rem; display:block; text-align:center; margin-bottom:10px; animation:bob 2.5s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

.q-context {
  background:var(--bg2); border-left:4px solid var(--teal);
  border-radius:0 12px 12px 0; padding:12px 14px;
  font-size:.88rem; color:var(--text2); line-height:1.7;
  margin-bottom:14px; font-style:italic;
}
.q-text {
  font-family:'Baloo 2',cursive; font-size:1.25rem; font-weight:700;
  color:var(--text); line-height:1.5; text-align:center; margin-bottom:6px;
}
.q-hint-area {
  min-height:22px; font-size:.82rem; color:var(--muted);
  text-align:center; margin-top:4px; transition:color .2s;
}
.q-hint-area.shown { color:var(--gold); font-weight:700; }

/* ── OPTIONS ── */
.options {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; margin-bottom:14px;
}
.option {
  background:var(--bg); border:2px solid var(--border);
  border-radius:14px; padding:14px 16px;
  cursor:pointer; text-align:left;
  font-family:'Nunito',sans-serif; font-size:.92rem; font-weight:700;
  color:var(--text); transition:all .16s;
  display:flex; align-items:center; gap:10px;
}
.option:hover:not(.disabled) {
  border-color:var(--teal); background:var(--teal-light);
  transform:translateY(-2px); box-shadow:0 4px 12px rgba(13,148,136,.15);
}
.opt-letter {
  width:28px; height:28px; border-radius:8px; flex-shrink:0;
  background:var(--border); color:var(--text2);
  display:flex; align-items:center; justify-content:center;
  font-size:.78rem; font-weight:800; transition:all .16s;
}
.option:hover:not(.disabled) .opt-letter { background:var(--teal); color:#fff; }
.option.correct { border-color:var(--correct); background:var(--correct-bg); }
.option.correct .opt-letter { background:var(--correct); color:#fff; }
.option.wrong { border-color:var(--wrong); background:var(--wrong-bg); }
.option.wrong .opt-letter { background:var(--wrong); color:#fff; }
.option.disabled { cursor:not-allowed; opacity:.75; }

/* ── FEEDBACK ── */
.feedback {
  text-align:center; padding:12px 16px; border-radius:14px;
  font-size:.92rem; font-weight:700; margin-bottom:12px;
  opacity:0; transition:opacity .2s; display:none;
}
.feedback.show { opacity:1; display:block; }
.feedback.correct { background:var(--correct-bg); color:var(--correct); border:1.5px solid rgba(5,150,105,.25); }
.feedback.wrong { background:var(--wrong-bg); color:var(--wrong); border:1.5px solid rgba(220,38,38,.2); }

.pembahasan {
  background:var(--gold-light); border:1.5px solid #fcd34d;
  border-radius:12px; padding:10px 14px; margin-bottom:12px;
  font-size:.82rem; color:#78350f; line-height:1.6; display:none;
}
.pembahasan.show { display:block; }
.pembahasan strong { color:#92400e; }

/* ── NAV ROW ── */
.nav-row { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.btn {
  padding:10px 20px; border-radius:12px;
  border:2px solid var(--border); background:var(--card);
  color:var(--text2); cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:.84rem; font-weight:700;
  transition:all .16s; box-shadow:0 2px 6px rgba(0,0,0,.04);
}
.btn:hover { border-color:var(--teal); color:var(--teal); }
.btn.primary { background:var(--teal); border-color:var(--teal); color:#fff; box-shadow:0 4px 12px rgba(13,148,136,.3); }
.btn.primary:hover { background:var(--teal-dark); }
.btn.coral { border-color:var(--coral); color:var(--coral); }
.btn.coral:hover { background:var(--coral-light); }

/* ── RESULTS ── */
.results {
  background:var(--card); border:2px solid var(--border);
  border-radius:24px; padding:36px 24px; text-align:center;
  box-shadow:var(--shadow-lg); animation:slideUp .4s ease;
}
.result-emoji { font-size:4rem; display:block; margin-bottom:8px; }
.result-score {
  font-family:'Baloo 2',cursive; font-size:4.5rem; font-weight:800;
  color:var(--teal); line-height:1;
}
.result-grade { font-family:'Baloo 2',cursive; font-size:1.6rem; font-weight:800; margin:6px 0; }
.result-desc { color:var(--text2); font-size:.9rem; margin-bottom:20px; }
.result-breakdown {
  display:flex; gap:12px; justify-content:center;
  margin-bottom:24px; flex-wrap:wrap;
}
.rb-item {
  background:var(--bg2); border:2px solid var(--border);
  border-radius:14px; padding:10px 20px; text-align:center;
}
.rb-val { font-family:'Baloo 2',cursive; font-size:1.6rem; font-weight:800; }

/* ── MATERI TAB ── */
.materi-card {
  background:var(--card); border:2px solid var(--border);
  border-radius:20px; padding:20px; margin-bottom:12px;
  box-shadow:var(--shadow);
}
.materi-card h3 {
  font-family:'Baloo 2',cursive; font-size:1rem; font-weight:700;
  color:var(--teal); margin-bottom:10px;
  display:flex; align-items:center; gap:8px;
}
.materi-card p { color:var(--text2); font-size:.86rem; line-height:1.75; margin-bottom:8px; }
.materi-tag {
  display:inline-block; background:var(--teal-light); color:var(--teal-dark);
  font-size:.72rem; font-weight:700; padding:3px 10px; border-radius:20px;
  margin:2px; border:1px solid rgba(13,148,136,.2);
}
.contoh-box {
  background:var(--bg2); border-left:3px solid var(--coral);
  border-radius:0 10px 10px 0; padding:10px 12px; margin-top:8px;
  font-size:.84rem; color:var(--text); line-height:1.7;
}

/* ── STREAK TOAST ── */
.streak-toast {
  position:fixed; top:20px; right:16px; z-index:999;
  background:var(--gold); color:#fff; font-weight:800;
  padding:10px 18px; border-radius:14px; font-size:.84rem;
  opacity:0; pointer-events:none; transition:opacity .3s;
  font-family:'Nunito',sans-serif; box-shadow:0 4px 20px rgba(217,119,6,.4);
}
.streak-toast.show { opacity:1; }

/* ── RESPONSIVE ── */
@media(max-width:500px) {
  header h1 { font-size:2rem; }
  .q-text { font-size:1.05rem; }
  .options { grid-template-columns:1fr; }
  .option { font-size:.86rem; }
  .result-score { font-size:3.5rem; }
}
</style>
</head>
<body>
<div class="wave-top"></div>
<div class="streak-toast" id="streakToast"></div>
<div class="container">

  <header>
    <div class="header-badge">📖 SD / MI</div>
    <h1>Bahasa<span>Ku</span> 📚</h1>
    <p>Latihan Bahasa Indonesia Kelas 1–6 SD/MI • 300 Soal Pilgan</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('latihan')">🎯 Latihan</button>
    <button class="tab" onclick="switchTab('materi')">📖 Materi</button>
  </div>

  <!-- LATIHAN -->
  <div id="tab-latihan">
    <div class="scorebar">
      <div class="sb-item"><div class="sb-val green" id="sc-benar">0</div><div class="sb-lbl">Benar</div></div>
      <div class="sb-item"><div class="sb-val red" id="sc-salah">0</div><div class="sb-lbl">Salah</div></div>
      <div class="sb-item"><div class="sb-val gold" id="sc-streak">0🔥</div><div class="sb-lbl">Streak</div></div>
      <div class="sb-item"><div class="sb-val teal" id="sc-no">1/10</div><div class="sb-lbl">Soal</div></div>
    </div>

    <div class="kelas-wrap">
      <button class="kelas-btn active" onclick="setKelas(1,this)">📗 Kelas 1</button>
      <button class="kelas-btn" onclick="setKelas(2,this)">📘 Kelas 2</button>
      <button class="kelas-btn" onclick="setKelas(3,this)">📙 Kelas 3</button>
      <button class="kelas-btn" onclick="setKelas(4,this)">📕 Kelas 4</button>
      <button class="kelas-btn" onclick="setKelas(5,this)">📓 Kelas 5</button>
      <button class="kelas-btn" onclick="setKelas(6,this)">📔 Kelas 6</button>
    </div>

    <div class="progress-label">
      <span id="prog-label">Soal 1 dari 10</span>
      <span id="prog-pct">10%</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressBar" style="width:10%"></div>
    </div>

    <div id="soal-area"></div>
  </div>

  <!-- MATERI -->
  <div id="tab-materi" style="display:none">
    <div class="kelas-wrap" style="margin-bottom:16px">
      <button class="kelas-btn active" onclick="setMateriKelas(1,this)">Kelas 1</button>
      <button class="kelas-btn" onclick="setMateriKelas(2,this)">Kelas 2</button>
      <button class="kelas-btn" onclick="setMateriKelas(3,this)">Kelas 3</button>
      <button class="kelas-btn" onclick="setMateriKelas(4,this)">Kelas 4</button>
      <button class="kelas-btn" onclick="setMateriKelas(5,this)">Kelas 5</button>
      <button class="kelas-btn" onclick="setMateriKelas(6,this)">Kelas 6</button>
    </div>
    <div id="materi-area"></div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════
   BANK SOAL — 300 SOAL BAHASA INDONESIA SD/MI
   50 soal per kelas (kelas 1–6)
══════════════════════════════════════════════ */

const SOAL = {

/* ────────────────── KELAS 1 ────────────────── */
1: [
  // Huruf vokal & konsonan
  {em:'🔤',sub:'Huruf Vokal',diff:'mudah',
   q:'Manakah yang termasuk huruf vokal?',
   opts:['B','K','A','T'], ans:2,
   p:'Huruf vokal adalah: a, i, u, e, o. Huruf A adalah vokal.'},
  {em:'🔤',sub:'Huruf Vokal',diff:'mudah',
   q:'Berapa banyak huruf vokal dalam alfabet?',
   opts:['3','4','5','6'], ans:2,
   p:'Huruf vokal ada 5: a, i, u, e, o.'},
  {em:'🔤',sub:'Huruf Konsonan',diff:'mudah',
   q:'Yang bukan huruf vokal adalah ...',
   opts:['A','I','B','U'], ans:2,
   p:'B adalah huruf konsonan, bukan vokal.'},
  {em:'🔤',sub:'Huruf Vokal',diff:'mudah',
   q:'Kata "ibu" memiliki berapa huruf vokal?',
   opts:['1','2','3','4'], ans:1,
   p:'i-b-u: huruf vokal ada 2 yaitu i dan u.'},
  {em:'📝',sub:'Suku Kata',diff:'mudah',
   q:'Suku kata dari kata "buku" adalah ...',
   opts:['bu-ku','buk-u','b-uku','buku'], ans:0,
   p:'"Buku" dibagi menjadi dua suku kata: bu-ku.'},
  {em:'📝',sub:'Suku Kata',diff:'mudah',
   q:'Suku kata dari kata "mata" adalah ...',
   opts:['mat-a','ma-ta','m-ata','mata'], ans:1,
   p:'"Mata" dibagi menjadi: ma-ta.'},
  {em:'📝',sub:'Membaca Kata',diff:'mudah',
   q:'Gambar seekor hewan yang meong-meong disebut ...',
   opts:['Anjing','Kucing','Burung','Ikan'], ans:1,
   p:'Hewan yang berbunyi meong adalah kucing.'},
  {em:'🏠',sub:'Kosakata',diff:'mudah',
   q:'Tempat kita belajar di sekolah disebut ...',
   opts:['Kamar','Dapur','Kelas','Taman'], ans:2,
   p:'Ruangan untuk belajar di sekolah disebut kelas.'},
  {em:'👨‍👩‍👧',sub:'Kosakata Keluarga',diff:'mudah',
   q:'Orang tua perempuan kita disebut ...',
   opts:['Ayah','Kakak','Nenek','Ibu'], ans:3,
   p:'Orang tua perempuan kita disebut ibu.'},
  {em:'👨‍👩‍👧',sub:'Kosakata Keluarga',diff:'mudah',
   q:'Saudara laki-laki yang lebih tua disebut ...',
   opts:['Adik','Kakak','Paman','Kakek'], ans:1,
   p:'Saudara laki-laki yang lebih tua disebut kakak.'},
  // Membaca kalimat pendek
  {em:'📖',sub:'Membaca',diff:'mudah',
   ctx:'Ani pergi ke sekolah setiap pagi.',
   q:'Ke mana Ani pergi setiap pagi?',
   opts:['Pasar','Sekolah','Rumah','Taman'], ans:1,
   p:'Berdasarkan kalimat tersebut, Ani pergi ke sekolah setiap pagi.'},
  {em:'📖',sub:'Membaca',diff:'mudah',
   ctx:'Budi makan nasi di rumah.',
   q:'Di mana Budi makan nasi?',
   opts:['Sekolah','Pasar','Rumah','Taman'], ans:2,
   p:'Berdasarkan kalimat, Budi makan nasi di rumah.'},
  {em:'📖',sub:'Kalimat Perintah',diff:'sedang',
   q:'Kalimat perintah yang sopan adalah ...',
   opts:['Ambil itu!','Tolong ambilkan buku itu!','Cepat ambil!','Ambil sekarang!'], ans:1,
   p:'Kalimat perintah yang sopan menggunakan kata "tolong".'},
  {em:'🙏',sub:'Salam',diff:'mudah',
   q:'Saat bertemu teman di pagi hari, kita mengucapkan ...',
   opts:['Selamat malam','Selamat siang','Selamat pagi','Sampai jumpa'], ans:2,
   p:'Saat bertemu di pagi hari kita mengucapkan "Selamat pagi".'},
  {em:'🙏',sub:'Perkenalan',diff:'mudah',
   q:'Saat berkenalan, kita menyebutkan ...',
   opts:['Nilai rapor','Nama kita','Uang jajan','Warna baju'], ans:1,
   p:'Saat berkenalan, kita menyebutkan nama kita kepada orang lain.'},
  // Anggota tubuh
  {em:'👀',sub:'Anggota Tubuh',diff:'mudah',
   q:'Anggota tubuh yang digunakan untuk melihat adalah ...',
   opts:['Telinga','Hidung','Mata','Mulut'], ans:2,
   p:'Kita menggunakan mata untuk melihat.'},
  {em:'👂',sub:'Anggota Tubuh',diff:'mudah',
   q:'Anggota tubuh yang digunakan untuk mendengar adalah ...',
   opts:['Mata','Telinga','Hidung','Tangan'], ans:1,
   p:'Kita menggunakan telinga untuk mendengar.'},
  {em:'👃',sub:'Anggota Tubuh',diff:'mudah',
   q:'Anggota tubuh yang digunakan untuk mencium bau adalah ...',
   opts:['Mata','Mulut','Kaki','Hidung'], ans:3,
   p:'Kita menggunakan hidung untuk mencium bau.'},
  // Huruf kapital & tanda titik
  {em:'✏️',sub:'Huruf Kapital',diff:'sedang',
   q:'Penulisan nama orang yang benar adalah ...',
   opts:['ani','ANI','Ani','aNi'], ans:2,
   p:'Nama orang selalu ditulis dengan huruf kapital di awal: Ani.'},
  {em:'✏️',sub:'Tanda Titik',diff:'sedang',
   q:'Tanda baca yang digunakan di akhir kalimat pernyataan adalah ...',
   opts:['Tanda tanya (?)','Tanda seru (!)','Tanda titik (.)','Tanda koma (,)'], ans:2,
   p:'Kalimat pernyataan diakhiri dengan tanda titik (.).'},
  // Dongeng

/* ══════════════════ STATE ══════════════════ */
let currentKelas = 1;
let pool = [], qIdx = 0, benar = 0, salah = 0, streak = 0, answered = false;
let currentQ = null;

function shuffle(arr){ return arr.sort(()=>Math.random()-.5); }
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function setKelas(k, el){
  currentKelas = k;
  document.querySelectorAll('#tab-latihan .kelas-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  buildPool();
}

function buildPool(){
  const all = SOAL[currentKelas];
  pool = shuffle([...all]).slice(0, 10);
  qIdx = 0; benar = 0; salah = 0; streak = 0; answered = false;
  updateScore();
  renderQuestion();
}

/* ══════════════════ RENDER ══════════════════ */
function renderQuestion(){
  const area = document.getElementById('soal-area');
  if(qIdx >= pool.length){ renderResults(); return; }
  answered = false;
  currentQ = pool[qIdx];

  const pct = Math.round(((qIdx+1)/pool.length)*100);
  document.getElementById('sc-no').textContent = `${qIdx+1}/10`;
  document.getElementById('prog-label').textContent = `Soal ${qIdx+1} dari 10`;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('progressBar').style.width = (pct)+'%';

  const q = currentQ;
  const diffClass = {mudah:'diff-mudah',sedang:'diff-sedang',sulit:'diff-sulit'}[q.diff]||'diff-mudah';
  const diffLabel = {mudah:'Mudah',sedang:'Sedang',sulit:'HOTS'}[q.diff]||'Mudah';
  const letters = ['A','B','C','D'];

  // shuffle options with index tracking
  let opts = q.opts.map((o,i)=>({text:o,orig:i}));
  opts = shuffle(opts);
  const correctShuffled = opts.findIndex(o=>o.orig===q.ans);

  const ctxHtml = q.ctx ? `<div class="q-context">${q.ctx}</div>` : '';

  area.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <div class="q-badge">📚 Kelas ${currentKelas}</div>
        <div class="q-subtema">${q.sub}</div>
        <div class="q-difficulty ${diffClass}">${diffLabel}</div>
      </div>
      <span class="q-emoji">${q.em}</span>
      ${ctxHtml}
      <div class="q-text">${q.q}</div>
      <div class="q-hint-area" id="q-hint">💡 Klik Petunjuk jika perlu bantuan</div>
    </div>
    <div id="feedback-box" class="feedback"></div>
    <div id="pembahasan-box" class="pembahasan"></div>
    <div class="options">
      ${opts.map((o,i)=>`
        <button class="option" onclick="checkAns(${i},${correctShuffled})" id="opt-${i}">
          <div class="opt-letter">${letters[i]}</div>
          <span>${o.text}</span>
        </button>`).join('')}
    </div>
    <div class="nav-row">
      <button class="btn" onclick="showHint()">💡 Petunjuk</button>
      <button class="btn coral" onclick="buildPool()">🔄 Reset</button>
    </div>
  `;
  // store for checking
  window._correctIdx = correctShuffled;
}

function checkAns(idx, correctIdx){
  if(answered) return;
  answered = true;
  const btns = document.querySelectorAll('.option');
  btns.forEach(b=>b.classList.add('disabled'));
  const q = currentQ;

  if(idx === correctIdx){
    btns[idx].classList.add('correct');
    benar++; streak++;
    updateScore();
    showFeedback(true);
    if(streak % 3 === 0) showStreakToast(`🔥 ${streak} benar berturut-turut!`);
  } else {
    btns[idx].classList.add('wrong');
    btns[correctIdx].classList.add('correct');
    salah++; streak = 0;
    updateScore();
    showFeedback(false);
  }

  // show pembahasan
  const pb = document.getElementById('pembahasan-box');
  pb.innerHTML = `<strong>📖 Pembahasan:</strong> ${q.p}`;
  pb.classList.add('show');

  setTimeout(()=>{ qIdx++; renderQuestion(); }, 2200);
}

function showFeedback(ok){
  const fb = document.getElementById('feedback-box');
  if(!fb) return;
  const msgs = ok
    ? ['✅ Benar! Luar biasa! 🌟','✅ Tepat sekali! 👏','✅ Hebat! 🎉','✅ Kamu pintar! 🏆']
    : ['❌ Belum tepat. Yuk pelajari pembahasannya!','❌ Salah. Coba perhatikan penjelasannya!'];
  const streak5 = streak >= 5 ? ' — Streak '+streak+'🔥' : '';
  fb.textContent = msgs[rand(0,msgs.length-1)] + (ok ? streak5 : '');
  fb.className = 'feedback show ' + (ok ? 'correct' : 'wrong');
}

function showHint(){
  const hint = document.getElementById('q-hint');
  if(!hint) return;
  const q = currentQ;
  const hints = {
    'Huruf Vokal':'💡 Ingat: huruf vokal adalah a, i, u, e, o.',
    'Huruf Konsonan':'💡 Konsonan = semua huruf selain a, i, u, e, o.',
    'Suku Kata':'💡 Suku kata dibagi berdasarkan vokal. Contoh: "bu-ku"',
    'Ide Pokok':'💡 Ide pokok biasanya ada di kalimat pertama atau terakhir paragraf.',
    'Kalimat Utama':'💡 Kalimat utama mengandung gagasan utama paragraf.',
    'Imbuhan':'💡 Cari kata dasarnya dulu, lalu tentukan imbuhannya.',
    'Pantun':'💡 Pantun: 4 baris, baris 1-2 sampiran, 3-4 isi, rima a-b-a-b.',
    'Pantun & Syair':'💡 Syair: 4 baris semua isi, rima a-a-a-a.',
    'Majas':'💡 Personifikasi=benda bersifat manusia, Simile=seperti/bagaikan, Metafora=perbandingan langsung.',
    'Kata Baku':'💡 Kata baku sesuai KBBI. Contoh: izin (bukan ijin), aktivitas (bukan aktifitas).',
    'Iklan':'💡 Iklan menggunakan bahasa persuasif = mengajak/membujuk.',
    'Kata Tanya':'💡 Siapa=orang, Apa=benda, Di mana=tempat, Kapan=waktu, Mengapa=alasan.',
  };
  const hintText = hints[q.sub] || '💡 Baca teks dengan teliti dan pilih jawaban yang paling tepat!';
  hint.textContent = hintText;
  hint.classList.add('shown');
}

function updateScore(){
  document.getElementById('sc-benar').textContent = benar;
  document.getElementById('sc-salah').textContent = salah;
  document.getElementById('sc-streak').textContent = streak+'🔥';
}

function showStreakToast(msg){
  const t = document.getElementById('streakToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function renderResults(){
  const pct = Math.round(benar/10*100);
  let em, grade, desc;
  if(pct>=90){em='🏆';grade='A+ Luar Biasa!';desc='Kamu sangat menguasai Bahasa Indonesia Kelas '+currentKelas+'!';}
  else if(pct>=80){em='🌟';grade='A Bagus Sekali!';desc='Hampir sempurna. Terus pertahankan!';}
  else if(pct>=70){em='👍';grade='B Cukup Baik';desc='Bagus! Masih ada ruang untuk berkembang.';}
  else if(pct>=60){em='📚';grade='C Perlu Latihan';desc='Yuk baca materinya lagi dan coba lagi!';}
  else{em='💪';grade='D Semangat!';desc='Jangan menyerah! Pelajari materi dulu ya.';}

  document.getElementById('soal-area').innerHTML=`
    <div class="results">
      <span class="result-emoji">${em}</span>
      <div style="font-size:.85rem;color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase">Hasil Kelas ${currentKelas}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-grade">${grade}</div>
      <div class="result-desc">${desc}</div>
      <div class="result-breakdown">
        <div class="rb-item"><div class="rb-val" style="color:var(--correct)">${benar}</div><div style="font-size:.7rem;color:var(--muted)">Benar</div></div>
        <div class="rb-item"><div class="rb-val" style="color:var(--wrong)">${salah}</div><div style="font-size:.7rem;color:var(--muted)">Salah</div></div>
        <div class="rb-item"><div class="rb-val" style="color:var(--teal)">10</div><div style="font-size:.7rem;color:var(--muted)">Total</div></div>
      </div>
      <div class="nav-row" style="justify-content:center">
        <button class="btn primary" onclick="buildPool()">🔄 Main Lagi</button>
        <button class="btn" onclick="switchTab('materi')">📖 Baca Materi</button>
      </div>
    </div>`;
}

/* ══════════════════ MATERI ══════════════════ */
let currentMateriKelas = 1;
function setMateriKelas(k, el){
  currentMateriKelas = k;
  document.querySelectorAll('#tab-materi .kelas-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderMateri();
}
function renderMateri(){
  const area = document.getElementById('materi-area');
  const items = MATERI[currentMateriKelas] || [];
  area.innerHTML = items.map(m=>`
    <div class="materi-card">
      <h3>${m.icon} ${m.judul}</h3>
      <p>${m.isi}</p>
      <div class="contoh-box">✏️ <b>Contoh:</b> ${m.contoh}</div>
    </div>
  `).join('');
}

/* ══════════════════ TABS ══════════════════ */
function switchTab(t){
  document.getElementById('tab-latihan').style.display = t==='latihan'?'block':'none';
  document.getElementById('tab-materi').style.display = t==='materi'?'block':'none';
  document.querySelectorAll('.tabs .tab').forEach((el,i)=>{
    el.classList.toggle('active', ['latihan','materi'][i]===t);
  });
  if(t==='materi') renderMateri();
}

buildPool();
</script>
